repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
    - id: check-yaml
    - id: check-merge-conflict
    - id: check-added-large-files
- repo: https://github.com/golangci/golangci-lint
  rev: v2.11.4
  hooks:
    - id: golangci-lint
- repo: https://github.com/TekWizely/pre-commit-golang
  rev: v1.0.0-rc.4
  hooks:
    - id: go-build-mod
    - id: go-test-mod
    - id: go-mod-tidy
