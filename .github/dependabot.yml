version: 2

updates:
  - package-ecosystem: 'pre-commit'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      # Group minor+patch updates together
      # Leave major updates and security updates to their own PRs
      pre-commit-minor:
        applies-to: 'version-updates'
        update-types:
          - 'patch'
          - 'minor'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'

  - package-ecosystem: 'docker'
    directory: '/collector'
    schedule:
      interval: 'weekly'
    # cooldown is omitted: it crashes the whole docker job when a candidate
    # tag points to a multi-arch image index (404 on the blob HEAD during
    # apply_cooldown). See dependabot/dependabot-core#14044.
    commit-message:
      prefix: 'chore'
      include: 'scope'

  - package-ecosystem: 'gomod'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      # Group minor+patch updates together
      # Leave major updates and security updates to their own PRs
      minor-updates:
        applies-to: 'version-updates'
        update-types:
          - 'patch'
          - 'minor'
