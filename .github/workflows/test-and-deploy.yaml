name: Test and Deploy CloudFunction

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  checks: read
  contents: read
  packages: read
  pull-requests: read
  statuses: read
  id-token: write

jobs:
  test:
    name: Format, vet, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Go mod tidy
        run: |
          go mod tidy
          git diff --quiet

      - name: Lint
        run: go tool golangci-lint run

      - name: Verify dependencies
        run: go mod verify

      - name: Create test database
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -c 'CREATE DATABASE flashlight;'

      - name: Run tests
        run: go test ./...

      - name: Go build
        run: |
          go build
          go build ./cmd/get-stats/main.go
          go build ./cmd/fix-fixtures/main.go

  push-otel-collector-test:
    name: Build and push OTel Collector for test instance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GAR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: northamerica-northeast2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Build and push test image
        run: ./collector/build.sh build-and-push flashlight-test

  push-otel-collector:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    name: Build and push OTel Collector for production instance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GAR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: northamerica-northeast2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Build and push production image
        run: ./collector/build.sh build-and-push flashlight

  deploy-test-instance:
    name: Deploy test instance
    runs-on: ubuntu-latest
    # Only deploy the test instance if the tests pass
    needs: [test, push-otel-collector-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: GCP login
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: 'prism-overlay'
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Login to GAR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: northamerica-northeast2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Deploy test instance
        run: ./cmd/deploy.sh flashlight-test

  build-and-deploy:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    name: Deploy cloud function
    runs-on: ubuntu-latest
    needs: push-otel-collector
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: GCP login
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: 'prism-overlay'
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Login to GAR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: northamerica-northeast2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Deploy production instance
        run: ./cmd/deploy.sh flashlight
