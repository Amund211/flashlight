name: Test and Deploy CloudFunction

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  checks: read
  contents: read
  packages: read
  pull-requests: read
  statuses: read
  id-token: write

jobs:
  test:
    name: Format, vet, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - name: Go mod tidy
        run: |
          go mod tidy
          git diff --quiet

      # No `version:` input — the action auto-detects from go.mod's require
      # directive (same version `go tool golangci-lint` resolves to).
      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1

      - name: Verify dependencies
        run: go mod verify

      - name: Create test database
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -c 'CREATE DATABASE flashlight;'

      - name: Run tests
        run: go test ./...

      - name: Go build
        run: |
          go build
          go build ./cmd/get-stats/main.go
          go build ./cmd/fix-fixtures/main.go

  push-otel-collector-test:
    name: Build and push OTel Collector for test instance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GAR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: northamerica-northeast2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Resolve image tag
        id: tag
        run: echo "image=$(./collector/build.sh get-url flashlight-test)" >> "$GITHUB_OUTPUT"

      - name: Build and push test image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./collector
          push: true
          tags: ${{ steps.tag.outputs.image }}
          # Test and prod images share a cache scope — they're built from the
          # same Dockerfile and config.yaml, so layers are byte-identical.
          cache-from: type=gha,scope=otel-collector
          cache-to: type=gha,mode=max,scope=otel-collector

  push-otel-collector:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    name: Build and push OTel Collector for production instance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GAR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: northamerica-northeast2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Resolve image tag
        id: tag
        run: echo "image=$(./collector/build.sh get-url flashlight)" >> "$GITHUB_OUTPUT"

      - name: Build and push production image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./collector
          push: true
          tags: ${{ steps.tag.outputs.image }}
          cache-from: type=gha,scope=otel-collector
          cache-to: type=gha,mode=max,scope=otel-collector

  deploy-test-instance:
    name: Deploy test instance
    runs-on: ubuntu-latest
    # Only deploy the test instance if the tests pass
    needs: [test, push-otel-collector-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: GCP login
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: 'prism-overlay'
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Login to GAR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: northamerica-northeast2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Deploy test instance
        run: ./cmd/deploy.sh flashlight-test

  build-and-deploy:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    name: Deploy cloud function
    runs-on: ubuntu-latest
    needs: push-otel-collector
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: GCP login
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: 'prism-overlay'
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Login to GAR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: northamerica-northeast2-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_JSON }}

      - name: Deploy production instance
        run: ./cmd/deploy.sh flashlight
