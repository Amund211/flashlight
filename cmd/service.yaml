apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: "${SERVICE_NAME}"
  labels:
    cloud.googleapis.com/location: "northamerica-northeast2"
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/container-dependencies: "{service:[collector]}"
        autoscaling.knative.dev/minScale: 0
        autoscaling.knative.dev/maxScale: 1
        run.googleapis.com/cloudsql-instances: "prism-overlay:northamerica-northeast2:flashlight-postgres"
    spec:
      containerConcurrency: 100
      timeoutSeconds: 30
      containers:
      - image: "${SERVICE_IMAGE}"
        name: "service"
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 1
            memory: 128Mi
        env:
        - name: "OTEL_EXPORTER_OTLP_ENDPOINT"
          value: "http://localhost:4317"
	    - name: "FLASHLIGHT_ENVIRONMENT"
          value: "${FLASHLIGHT_ENVIRONMENT}"
	    - name: "DB_USERNAME"
          value: "postgres"
	    - name: "CLOUDSQL_UNIX_SOCKET"
          value: "/cloudsql/prism-overlay:northamerica-northeast2:flashlight-postgres"
        secrets:
        - name: "HYPIXEL_API_KEY"
          value: "prism-hypixel-api-key:latest"
	    - name: "DB_PASSWORD"
          value: "flashlight-db-password:latest"
	    - name: "SENTRY_DSN"
          value: "${SENTRY_DSN_KEY}:latest"
      - image: ${COLLECTOR_IMAGE}
        name: collector
        startupProbe:
          httpGet:
            path: /
            port: 13133
